name: Deploy Velora Mobility Optimizer

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

jobs:
  # ──────────────────────────────────────────
  # Job 1: Deploy Frontend to Vercel
  # ──────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        working-directory: ./frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        working-directory: ./frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}

      - name: Deploy
        working-directory: ./frontend
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ──────────────────────────────────────────
  # Job 2: Deploy Backend to Oracle Cloud
  # ──────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Oracle Cloud
    runs-on: ubuntu-latest
    needs: deploy-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            cd /opt/velora
            sudo bash deploy/deploy.sh
            sleep 3
            curl -f http://localhost:3001/api/health || exit 1
            echo "Backend deployed successfully"

  # ──────────────────────────────────────────
  # Job 3: Integration Test
  # ──────────────────────────────────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: github.event_name == 'push'

    steps:
      - name: Health Check
        run: |
          echo "Testing API health..."
          curl -f ${{ secrets.VITE_API_BASE }}/health
          echo ""
          echo "Testing testcases endpoint..."
          curl -f ${{ secrets.VITE_API_BASE }}/testcases
          echo ""
          echo "All integration tests passed!"
