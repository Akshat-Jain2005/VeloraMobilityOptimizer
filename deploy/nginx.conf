# Velora Mobility Optimizer — Nginx Production Config
# Replace velora.example.com with your actual domain

upstream velorabackend_kri_2651_ti {
    server 127.0.0.1:3001;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name velora.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name velora.example.com;

    # SSL — managed by certbot
    ssl_certificate /etc/letsencrypt/live/velora.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/velora.example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/velora.example.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/velora-access.log;
    error_log /var/log/nginx/velora-error.log warn;

    client_max_body_size 10M;

    # API proxy
    location /api {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://velorabackend_kri_2651_ti;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;

        # Long timeout for optimization runs
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # CORS backup
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Upload endpoints — stricter rate limit
    location ~ ^/api/(optimize|parse) {
        limit_req zone=upload_limit burst=5 nodelay;

        proxy_pass http://velorabackend_kri_2651_ti;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Health check — no rate limit, no logging
    location /health {
        access_log off;
        proxy_pass http://velorabackend_kri_2651_ti/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
