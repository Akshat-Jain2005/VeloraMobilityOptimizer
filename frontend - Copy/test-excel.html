<!doctype html>
<html>
  <head>
    <title>Excel Parser Test</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  </head>
  <body>
    <h1>Excel Parser Test</h1>
    <input type="file" id="fileInput" accept=".xlsx,.xls" />
    <pre
      id="output"
      style="background: #f0f0f0; padding: 20px; margin-top: 20px"
    ></pre>

    <script>
      document
        .getElementById("fileInput")
        .addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          const output = document.getElementById("output");
          output.textContent = "Parsing...";

          try {
            const buffer = await file.arrayBuffer();
            const workbook = XLSX.read(buffer, { type: "array" });

            output.textContent = "Workbook loaded!\n\n";
            output.textContent +=
              "Sheet names: " + workbook.SheetNames.join(", ") + "\n\n";

            if (workbook.Sheets["vehicles"]) {
              const vehicles = XLSX.utils.sheet_to_json(
                workbook.Sheets["vehicles"],
              );
              output.textContent += "Vehicles (" + vehicles.length + "):\n";
              output.textContent += JSON.stringify(vehicles, null, 2) + "\n\n";
            }

            if (workbook.Sheets["employees"]) {
              const employees = XLSX.utils.sheet_to_json(
                workbook.Sheets["employees"],
              );
              output.textContent += "Employees (" + employees.length + "):\n";
              output.textContent += JSON.stringify(employees, null, 2) + "\n\n";
            }

            if (workbook.Sheets["metadata"]) {
              const metadata = XLSX.utils.sheet_to_json(
                workbook.Sheets["metadata"],
              );
              output.textContent += "Metadata (" + metadata.length + "):\n";
              output.textContent += JSON.stringify(metadata, null, 2) + "\n\n";
            }
          } catch (error) {
            output.textContent =
              "ERROR: " + error.message + "\n\n" + error.stack;
          }
        });
    </script>
  </body>
</html>
